<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add tasks</title>
    <link rel="stylesheet" href="add.css">
</head>
<body>
    
    <div class="container">

        <div class="sidebar">
        <ul class="menu">
                    <li><a href="#">Dashboard</a></li>
                  <li><a href="completed tasks.html">completed tasks</a></li>
                   <li> <a href="pending.html">pending tasks</a></li>
                      <li><a href="add.html">Add new tasks</a></li>
                        <li><a href="task.html">task stats</a></li>
        </ul>
        </div>
        <h1>Add new tasks</h1>
        
        <div class="s">
        <div class="input">
            <label>Title</label>
            <input type="text" placeholder="Task title"></input>
        </div>
        <div class="input">
            <label>Description</label>
            <textarea rows="4" placeholder="Task description"></textarea>
        </div>
        <div class="row">
        <div class="input">
            <label>start date</label>
            <input type="date"></input>
        </div>
         <div class="input">
            <label>End date</label>
            <input type="date"></input>
        </div>
        </div>
        <div class="input">
            <label>status</label>
            <select>
                <option>pending</option>
                 <option>completed</option>
                  <option>in progress</option>
            </select>
        </div>
        <button type="submit" id="submit">Add</button>
        </div>
    </div>    
</body>
</html>
